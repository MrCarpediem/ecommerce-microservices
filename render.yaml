services:
  # 1. Service Registry
  - type: web
    name: shopease-registry-v1
    env: node
    plan: free
    rootDir: Backend/serviceRegistry
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000

  # 2. Auth Service
  - type: web
    name: shopease-auth-v1
    env: node
    plan: free
    rootDir: Backend/authService
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: shopease_super_secret_2026
      - key: JWT_REFRESH_SECRET
        value: shopease_refresh_secret_2026
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: SERVICE_SECRET
        value: shopease_service_secret_2026
      - key: REGISTRY_URL
        value: http://shopease-registry-v1:5000
      - key: SERVICE_URL
        fromService:
          type: web
          name: shopease-auth-v1
          envVarKey: RENDER_EXTERNAL_URL

  # 3. User Service
  - type: web
    name: shopease-user-v1
    env: node
    plan: free
    rootDir: Backend/userService
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5002
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: shopease_super_secret_2026
      - key: SERVICE_SECRET
        value: shopease_service_secret_2026
      - key: REGISTRY_URL
        value: http://shopease-registry-v1:5000
      - key: SERVICE_URL
        fromService:
          type: web
          name: shopease-user-v1
          envVarKey: RENDER_EXTERNAL_URL

  # 4. Product Service
  - type: web
    name: shopease-product-v1
    env: node
    plan: free
    rootDir: Backend/productService
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5003
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: shopease_super_secret_2026
      - key: SERVICE_SECRET
        value: shopease_service_secret_2026
      - key: REGISTRY_URL
        value: http://shopease-registry-v1:5000
      - key: SERVICE_URL
        fromService:
          type: web
          name: shopease-product-v1
          envVarKey: RENDER_EXTERNAL_URL

  # 5. Cart Service
  - type: web
    name: shopease-cart-v1
    env: node
    plan: free
    rootDir: Backend/cartService
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5004
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: shopease_super_secret_2026
      - key: SERVICE_SECRET
        value: shopease_service_secret_2026
      - key: REGISTRY_URL
        value: http://shopease-registry-v1:5000
      - key: SERVICE_URL
        fromService:
          type: web
          name: shopease-cart-v1
          envVarKey: RENDER_EXTERNAL_URL

  # 6. Order Service
  - type: web
    name: shopease-order-v1
    env: node
    plan: free
    rootDir: Backend/orderService
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5005
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: shopease_super_secret_2026
      - key: SERVICE_SECRET
        value: shopease_service_secret_2026
      - key: REGISTRY_URL
        value: http://shopease-registry-v1:5000
      - key: SERVICE_URL
        fromService:
          type: web
          name: shopease-order-v1
          envVarKey: RENDER_EXTERNAL_URL

  # 7. API Gateway
  - type: web
    name: shopease-gateway-v1
    env: node
    plan: free
    rootDir: Backend/apiGateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5006
      - key: JWT_SECRET
        value: shopease_super_secret_2026
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: shopease-auth-v1
          envVarKey: RENDER_EXTERNAL_URL
      - key: USER_SERVICE_URL
        fromService:
          type: web
          name: shopease-user-v1
          envVarKey: RENDER_EXTERNAL_URL
      - key: PRODUCT_SERVICE_URL
        fromService:
          type: web
          name: shopease-product-v1
          envVarKey: RENDER_EXTERNAL_URL
      - key: CART_SERVICE_URL
        fromService:
          type: web
          name: shopease-cart-v1
          envVarKey: RENDER_EXTERNAL_URL
      - key: ORDER_SERVICE_URL
        fromService:
          type: web
          name: shopease-order-v1
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        sync: false
