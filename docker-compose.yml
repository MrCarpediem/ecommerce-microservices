version: '3.8'

services:
  mongo:
    image: mongo:4.4
    restart: unless-stopped
    ports:
      - '27020:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet || mongo --eval "db.adminCommand('ping')" || exit 0
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  registry:
    build:
      context: ./Backend/serviceRegistry
    restart: unless-stopped
    ports:
      - '5007:5000'
    environment:
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  auth:
    build:
      context: ./Backend/authService
    restart: unless-stopped
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://172.17.0.1:27020/auth-service
      - JWT_SECRET=shopease_super_secret_2026
      - JWT_REFRESH_SECRET=shopease_refresh_secret_2026
      - JWT_EXPIRES_IN=24h
      - SERVICE_SECRET=shopease_service_secret_2026
      - REGISTRY_URL=http://172.17.0.1:5007
      - SERVICE_URL=http://172.17.0.1:5001
      - FRONTEND_URL=http://${PUBLIC_IP:-localhost}:5173
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy
    networks:
      - ecommerce-net

  user:
    build:
      context: ./Backend/userService
    restart: unless-stopped
    ports:
      - '5002:5002'
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://172.17.0.1:27020/user-service
      - JWT_SECRET=shopease_super_secret_2026
      - SERVICE_SECRET=shopease_service_secret_2026
      - REGISTRY_URL=http://172.17.0.1:5007
      - SERVICE_URL=http://172.17.0.1:5002
      - FRONTEND_URL=http://${PUBLIC_IP:-localhost}:5173
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy
    networks:
      - ecommerce-net

  product:
    build:
      context: ./Backend/productService
    restart: unless-stopped
    ports:
      - '5003:5003'
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://172.17.0.1:27020/product-service
      - JWT_SECRET=shopease_super_secret_2026
      - SERVICE_SECRET=shopease_service_secret_2026
      - REGISTRY_URL=http://172.17.0.1:5007
      - SERVICE_URL=http://172.17.0.1:5003
      - FRONTEND_URL=http://${PUBLIC_IP:-localhost}:5173
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy
    volumes:
      - product-uploads:/app/uploads
    networks:
      - ecommerce-net

  cart:
    build:
      context: ./Backend/cartService
    restart: unless-stopped
    ports:
      - '5004:5004'
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://172.17.0.1:27020/cart-service
      - JWT_SECRET=shopease_super_secret_2026
      - SERVICE_SECRET=shopease_service_secret_2026
      - REGISTRY_URL=http://172.17.0.1:5007
      - SERVICE_URL=http://172.17.0.1:5004
      - FRONTEND_URL=http://${PUBLIC_IP:-localhost}:5173
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy
    networks:
      - ecommerce-net

  order:
    build:
      context: ./Backend/orderService
    restart: unless-stopped
    ports:
      - '5005:5005'
    environment:
      - PORT=5005
      - MONGO_URI=mongodb://172.17.0.1:27020/order-service
      - JWT_SECRET=shopease_super_secret_2026
      - SERVICE_SECRET=shopease_service_secret_2026
      - REGISTRY_URL=http://172.17.0.1:5007
      - SERVICE_URL=http://172.17.0.1:5005
      - FRONTEND_URL=http://${PUBLIC_IP:-localhost}:5173
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy
    networks:
      - ecommerce-net

  gateway:
    build:
      context: ./Backend/apiGateway
    restart: unless-stopped
    ports:
      - '5006:5006'
    environment:
      - PORT=5006
      - AUTH_SERVICE_URL=http://172.17.0.1:5001
      - USER_SERVICE_URL=http://172.17.0.1:5002
      - PRODUCT_SERVICE_URL=http://172.17.0.1:5003
      - CART_SERVICE_URL=http://172.17.0.1:5004
      - ORDER_SERVICE_URL=http://172.17.0.1:5005
      - FRONTEND_URL=http://${PUBLIC_IP:-localhost}:5173
      - JWT_SECRET=shopease_super_secret_2026
    depends_on:
      auth:
        condition: service_started
      user:
        condition: service_started
      product:
        condition: service_started
      cart:
        condition: service_started
      order:
        condition: service_started
    networks:
      - ecommerce-net

  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    ports:
      - '5173:4173'
    environment:
      - VITE_API_GATEWAY_URL=http://${PUBLIC_IP:-localhost}:5006
    depends_on:
      - gateway
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  product-uploads:
    driver: local
