version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - '27019:27017'
    volumes:
      - mongo-data:/data/db

  registry:
    build:
      context: ./Backend/serviceRegistry
    ports:
      - '5007:5000'
    environment:
      - PORT=5000

  auth:
    build:
      context: ./Backend/authService
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongo:27017/auth-service
      - JWT_SECRET=replace_with_secure_secret
      - JWT_EXPIRES_IN=24h
      - SERVICE_SECRET=replace_with_service_secret
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://auth:5001
      - FRONTEND_URL=http://localhost:5175
    depends_on:
      - mongo
      - registry

  user:
    build:
      context: ./Backend/userService
    ports:
      - '5002:5002'
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongo:27017/user-service
      - JWT_SECRET=replace_with_secure_secret
      - SERVICE_SECRET=replace_with_service_secret
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://user:5002
      - FRONTEND_URL=http://localhost:5175
    depends_on:
      - mongo
      - registry

  product:
    build:
      context: ./Backend/productService
    ports:
      - '5003:5003'
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongo:27017/product-service
      - JWT_SECRET=replace_with_secure_secret
      - SERVICE_SECRET=replace_with_service_secret
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://product:5003
      - FRONTEND_URL=http://localhost:5175
    depends_on:
      - mongo
      - registry

  cart:
    build:
      context: ./Backend/cartService
    ports:
      - '5004:5004'
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://mongo:27017/cart-service
      - JWT_SECRET=replace_with_secure_secret
      - SERVICE_SECRET=replace_with_service_secret
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://cart:5004
      - FRONTEND_URL=http://localhost:5175
    depends_on:
      - mongo
      - registry

  order:
    build:
      context: ./Backend/orderService
    ports:
      - '5005:5005'
    environment:
      - PORT=5005
      - MONGO_URI=mongodb://mongo:27017/order-service
      - JWT_SECRET=replace_with_secure_secret
      - SERVICE_SECRET=replace_with_service_secret
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://order:5005
      - FRONTEND_URL=http://localhost:5175
    depends_on:
      - mongo
      - registry

  frontend:
    build:
      context: ./Frontend
    ports:
      - '5175:4173'
    environment:
      - VITE_REGISTRY_URL=http://localhost:5007
    depends_on:
      - registry

volumes:
  mongo-data:
    driver: local
