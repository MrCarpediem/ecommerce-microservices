version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-prod-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  registry:
    build:
      context: ./Backend/serviceRegistry
    environment:
      - PORT=5000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ./Backend/authService
    environment:
      - PORT=5001
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/auth-service
      - JWT_SECRET=${JWT_SECRET:-production_secure_secret}
      - JWT_EXPIRES_IN=24h
      - SERVICE_SECRET=${SERVICE_SECRET:-production_service_secret}
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://auth:5001
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy

  user:
    build:
      context: ./Backend/userService
    environment:
      - PORT=5002
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/user-service
      - JWT_SECRET=${JWT_SECRET:-production_secure_secret}
      - SERVICE_SECRET=${SERVICE_SECRET:-production_service_secret}
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://user:5002
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy

  product:
    build:
      context: ./Backend/productService
    environment:
      - PORT=5003
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/product-service
      - JWT_SECRET=${JWT_SECRET:-production_secure_secret}
      - SERVICE_SECRET=${SERVICE_SECRET:-production_service_secret}
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://product:5003
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy
    volumes:
      - product-prod-uploads:/app/uploads

  cart:
    build:
      context: ./Backend/cartService
    environment:
      - PORT=5004
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/cart-service
      - JWT_SECRET=${JWT_SECRET:-production_secure_secret}
      - SERVICE_SECRET=${SERVICE_SECRET:-production_service_secret}
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://cart:5004
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy

  order:
    build:
      context: ./Backend/orderService
    environment:
      - PORT=5005
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/order-service
      - JWT_SECRET=${JWT_SECRET:-production_secure_secret}
      - SERVICE_SECRET=${SERVICE_SECRET:-production_service_secret}
      - REGISTRY_URL=http://registry:5000
      - SERVICE_URL=http://order:5005
    depends_on:
      mongo:
        condition: service_healthy
      registry:
        condition: service_healthy

  gateway:
    build:
      context: ./Backend/apiGateway
    ports:
      - '80:5006' # EXPOSED AS PORT 80 for production access
    environment:
      - PORT=5006
      - NODE_ENV=production
      - AUTH_SERVICE_URL=http://auth:5001
      - USER_SERVICE_URL=http://user:5002
      - PRODUCT_SERVICE_URL=http://product:5003
      - CART_SERVICE_URL=http://cart:5004
      - ORDER_SERVICE_URL=http://order:5005
      - FRONTEND_URL=${FRONTEND_URL:-https://your-vercel-domain.vercel.app}
      - JWT_SECRET=${JWT_SECRET:-production_secure_secret}
    depends_on:
      - auth
      - user
      - product
      - cart
      - order

volumes:
  mongo-prod-data:
    driver: local
  product-prod-uploads:
    driver: local
